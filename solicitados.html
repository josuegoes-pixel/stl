<!DOCTYPE html>
<html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Solicitados — Catálogo STLFLIX</title>
<style>
:root{--bg:#0d0e12;--panel:#15171e;--panel2:#1c1f28;--line:#262a35;--txt:#e8eaf0;--mut:#8b90a0;--accent:#6c5ce7;--chip:#20232e;--ok:#2ecc71;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:Inter,Segoe UI,system-ui,Arial,sans-serif;font-size:14px}
a{color:inherit;text-decoration:none}
header{display:flex;align-items:center;gap:16px;padding:14px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:5}
.logo{font-weight:800;font-size:18px;letter-spacing:.5px}
.logo span{color:var(--accent)}
.navlink{margin-left:auto;background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600}
.navlink:hover{border-color:var(--accent);color:var(--accent)}
main{max-width:1200px;margin:0 auto;padding:22px}
h1{font-size:22px;margin:0 0 4px}
.sub{color:var(--mut);margin-bottom:24px}
.day{margin-bottom:34px}
.dayhead{font-size:16px;font-weight:800;padding:10px 14px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;display:flex;justify-content:space-between;align-items:center}
.dayhead small{color:var(--mut);font-weight:600}
.cathead{font-size:13px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.6px;margin:18px 4px 10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.thumb{height:150px;background-size:cover;background-position:center;background-color:var(--panel2)}
.cbody{padding:12px;flex:1}
.cname{font-weight:600;font-size:13px;line-height:1.35}
.meta{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.tag{background:var(--chip);color:var(--mut);font-size:10px;padding:3px 8px;border-radius:20px}
.tag.pend{color:#f1c40f}
.tag.ok{color:var(--ok)}
.cfoot{display:flex;border-top:1px solid var(--line)}
.abtn{flex:1;border:none;padding:11px 8px;cursor:pointer;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;background:var(--accent);color:#fff}
.abtn:hover{filter:brightness(1.12)}
.abtn.dl{background:var(--ok)}
.abtn.edit{flex:0 0 46px;background:var(--panel2);color:var(--mut);border-left:1px solid var(--line)}
.abtn.edit:hover{color:var(--txt)}
.openlink{flex:0 0 46px;display:flex;align-items:center;justify-content:center;background:var(--panel2);color:var(--accent);border-left:1px solid var(--line);font-size:13px}
.empty,.loading{color:var(--mut);padding:60px;text-align:center}
.err{color:#e74c3c;padding:40px;text-align:center}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:50}
.overlay.on{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;width:min(480px,92vw)}
.modal h3{margin:0 0 4px;font-size:16px}
.modal .mname{color:var(--mut);font-size:13px;margin-bottom:16px}
.modal input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:11px 12px;color:var(--txt);font-size:13px;outline:none}
.modal input:focus{border-color:var(--accent)}
.mbtns{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
.mbtn{border:none;border-radius:8px;padding:10px 18px;font-weight:700;font-size:13px;cursor:pointer}
.mbtn.cancel{background:var(--panel2);color:var(--mut)}
.mbtn.confirm{background:var(--accent);color:#fff}
.mbtn.confirm:disabled{opacity:.5;cursor:default}
.msuccess{display:none;align-items:center;gap:8px;color:var(--ok);font-weight:700;margin-top:14px}
.msuccess.on{display:flex}
</style></head>
<body>
<header>
<div class="logo">STL<span>FLIX</span> · solicitados</div>
<a class="navlink" href="index.html">← Voltar ao catálogo</a>
</header>
<main>
<h1>Itens solicitados</h1>
<div class="sub" id="sub">Organizado por dia e categoria</div>
<input id="q" type="search" placeholder="Buscar solicitação por nome ou categoria..." style="width:100%;max-width:420px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:11px 14px;color:var(--txt);font-size:13px;outline:none;margin-bottom:22px">

<div id="content"><div class="loading">Carregando solicitações...</div></div>
</main>

<div class="overlay" id="overlay">
<div class="modal">
<h3>Adicionar link do Drive</h3>
<div class="mname" id="mname"></div>
<input id="minput" type="url" placeholder="https://drive.google.com/...">
<div class="msuccess" id="msuccess">✓ Link adicionado com sucesso!</div>
<div class="mbtns">
<button class="mbtn cancel" id="mcancel">Cancelar</button>
<button class="mbtn confirm" id="mconfirm">Confirmar</button>
</div>
</div>
</div>

<script>
const SB_URL="https://thkrqqzofjquzlyuytaa.supabase.co", SB_KEY="sb_publishable_wUY-5yzykhXqAwbrkidEHw_v2tXqPlD";
const SB_ON=!SB_URL.startsWith('__');
const sb=(p,opt={})=>fetch(SB_URL+'/rest/v1/'+p,{...opt,headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json',...(opt.headers||{})}});
let ROWS=[];
function dayLabel(d){
  const dt=new Date(d),now=new Date();
  const day=x=>new Date(x.getFullYear(),x.getMonth(),x.getDate()).getTime();
  const diff=(day(now)-day(dt))/864e5;
  if(diff===0)return 'Hoje';
  if(diff===1)return 'Ontem';
  return dt.toLocaleDateString('pt-BR');
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function cardHTML(r){
  const pend=!r.drive_url;
  return '<div class="card" data-slug="'+esc(r.slug)+'">'+
  '<div class="thumb" style="background-image:url(\''+esc(r.img)+'\')"></div>'+
  '<div class="cbody"><div class="cname">'+esc(r.name)+'</div>'+
  '<div class="meta"><span class="tag">'+esc(r.cat)+'</span>'+
  '<span class="tag '+(pend?'pend':'ok')+'">'+(pend?'⏳ Pendente':'✓ Com link')+'</span>'+
  '<span class="tag">'+new Date(r.requested_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+'</span></div></div>'+
  '<div class="cfoot">'+
  (pend?'<button class="abtn" data-act="add">🔗 Adicionar link do Drive</button>'
       :'<button class="abtn dl" data-act="dl">⬇ Download</button><button class="abtn edit" data-act="add" title="Editar link">✎</button>')+
  '<a class="openlink" href="'+esc(r.link)+'" target="_blank" rel="noopener" title="Ver no STLFLIX">↗</a>'+
  '</div></div>';
}
let FILTER='';
function renderAll(){
  const c=document.getElementById('content');
  if(!ROWS.length){c.innerHTML='<div class="empty">Nenhuma solicitação ainda. Volte ao catálogo e clique em ➕ Solicitar.</div>';return;}
  const vis=FILTER?ROWS.filter(r=>(r.name+' '+(r.cat||'')).toLowerCase().includes(FILTER)):ROWS;
  if(!vis.length){c.innerHTML='<div class="empty">Nada encontrado para "'+esc(FILTER)+'".</div>';return;}
  const days={};
  vis.forEach(r=>{const k=dayLabel(r.requested_at);(days[k]=days[k]||[]).push(r);});
  let html='';
  for(const [day,rows] of Object.entries(days)){
    const pend=rows.filter(r=>!r.drive_url).length;
    html+='<section class="day"><div class="dayhead"><span>'+day+'</span><small>'+rows.length+' item(ns) · '+pend+' pendente(s)</small></div>';
    const cats={};
    rows.forEach(r=>{(cats[r.cat||'Outros']=cats[r.cat||'Outros']||[]).push(r);});
    for(const [cat,list] of Object.entries(cats)){
      html+='<div class="cathead">'+esc(cat)+'</div><div class="grid">'+list.map(cardHTML).join('')+'</div>';
    }
    html+='</section>';
  }
  c.innerHTML=html;
  const total=ROWS.length,pend=ROWS.filter(r=>!r.drive_url).length;
  document.getElementById('sub').textContent=total+' solicitação(ões) · '+pend+' pendente(s) · '+(total-pend)+' com link';
}
async function load(){
  if(!SB_ON){document.getElementById('content').innerHTML='<div class="err">Backend ainda não configurado.</div>';return;}
  try{
    const r=await sb('requests?select=*&order=requested_at.desc');
    ROWS=await r.json();
    renderAll();
  }catch(e){document.getElementById('content').innerHTML='<div class="err">Erro ao carregar. Recarregue a página.</div>';}
}
/* modal */
let cur=null;
const ov=document.getElementById('overlay'),inp=document.getElementById('minput'),ok=document.getElementById('msuccess'),cf=document.getElementById('mconfirm');
function openModal(r){
  cur=r;ok.classList.remove('on');cf.disabled=false;cf.textContent='Confirmar';
  document.getElementById('mname').textContent=r.name;
  inp.value=r.drive_url||'';ov.classList.add('on');inp.focus();
}
document.getElementById('mcancel').onclick=()=>ov.classList.remove('on');
ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('on');});
cf.onclick=async()=>{
  const url=inp.value.trim();
  if(!/^https?:\/\/.+/.test(url)){inp.style.borderColor='#e74c3c';return;}
  inp.style.borderColor='var(--line)';cf.disabled=true;cf.textContent='Salvando...';
  try{
    const r=await sb('requests?slug=eq.'+encodeURIComponent(cur.slug),{method:'PATCH',body:JSON.stringify({drive_url:url,status:'atendido'})});
    if(!r.ok)throw 0;
    cur.drive_url=url;cur.status='atendido';
    ok.classList.add('on');
    setTimeout(()=>{ov.classList.remove('on');renderAll();},900);
  }catch(e){cf.disabled=false;cf.textContent='Confirmar';alert('Erro ao salvar. Tente novamente.');}
};
inp.addEventListener('keydown',e=>{if(e.key==='Enter')cf.click();});
document.getElementById('content').addEventListener('click',e=>{
  const b=e.target.closest('.abtn');if(!b)return;
  const slug=b.closest('.card').dataset.slug;
  const r=ROWS.find(x=>x.slug===slug);
  if(b.dataset.act==='dl'){window.open(r.drive_url,'_blank');return;}
  if(b.dataset.act==='add')openModal(r);
});
document.getElementById('q').addEventListener('input',e=>{FILTER=e.target.value.trim().toLowerCase();renderAll();});
load();
</script>
</body></html>
