<!DOCTYPE html>
<html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catálogo STLFLIX — uso pessoal</title>
<style>
:root{--bg:#0d0e12;--panel:#15171e;--panel2:#1c1f28;--line:#262a35;--txt:#e8eaf0;--mut:#8b90a0;--accent:#6c5ce7;--chip:#20232e;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:Inter,Segoe UI,system-ui,Arial,sans-serif;font-size:14px}
a{color:inherit;text-decoration:none}
header{position:sticky;top:0;z-index:10;background:#0b0c10;border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;gap:16px}
.logo{font-weight:800;letter-spacing:.5px;color:#fff;font-size:18px}
.logo span{color:var(--accent)}
.searchbar{flex:1;max-width:520px}
.searchbar input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:9px 14px;outline:none}
.note{color:var(--mut);font-size:12px}
.layout{display:flex;align-items:flex-start}
aside{width:230px;flex:none;padding:18px 14px;border-right:1px solid var(--line);position:sticky;top:57px;height:calc(100vh - 57px);overflow:auto}
aside h4{color:var(--mut);font-size:11px;letter-spacing:1px;text-transform:uppercase;margin:16px 8px 8px}
.cat{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--txt)}
.cat:hover{background:var(--panel)}
.cat.active{background:var(--accent);color:#fff}
.cat small{color:var(--mut)}
.cat.active small{color:#dcd8ff}
main{flex:1;padding:18px 22px;min-width:0}
h1{font-size:22px;margin:0 0 14px}
.filters{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
select,.toggle{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:8px 12px;outline:none;cursor:pointer}
.toggle{display:flex;align-items:center;gap:8px;user-select:none}
.toggle input{accent-color:var(--accent)}
.count{margin-left:auto;color:var(--mut)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:.15s}
.card:hover{border-color:var(--accent);transform:translateY(-2px)}
.thumb{aspect-ratio:1/1;background:#000 center/cover no-repeat;position:relative}
.mpflag{position:absolute;left:8px;bottom:8px;background:rgba(0,0,0,.7);color:#fff;font-size:11px;padding:3px 8px;border-radius:6px}
.cbody{padding:10px 12px}
.cname{font-weight:600;font-size:13px;line-height:1.3;min-height:34px}
.ctags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.tag{background:var(--chip);color:var(--mut);font-size:10px;padding:3px 7px;border-radius:20px;white-space:nowrap}
.cfoot{display:flex;border-top:1px solid var(--line)}
.copybtn{flex:1.5;background:var(--accent);border:none;color:#fff;padding:11px 8px;cursor:pointer;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s}
.copybtn:hover{background:#8577ee}
.copybtn.copied{background:#2ecc71}
.open{flex:1;display:flex;align-items:center;justify-content:center;background:var(--panel2);padding:11px 8px;color:var(--accent);font-weight:600;font-size:12px;border-left:1px solid var(--line)}
.open:hover{background:var(--panel2);color:#fff}
.more{display:block;margin:22px auto;padding:11px 22px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:10px;cursor:pointer}
.empty{color:var(--mut);padding:40px;text-align:center}
</style></head>
<body>
<header>
<div class="logo">STL<span>FLIX</span> · catálogo</div>
<div class="searchbar"><input id="q" placeholder="Buscar por nome..."></div>
<div class="note">uso pessoal · assinante · links abrem o site oficial</div>
</header>
<div class="layout">
<aside id="side"></aside>
<main>
<h1 id="title">Todos os modelos</h1>
<div class="filters">
<select id="fPrinter"><option value="">Tipo de impressora</option></select>
<select id="fDiff"><option value="">Dificuldade</option></select>
<select id="fTime"><option value="">Tempo de impressão</option></select>
<label class="toggle"><input type="checkbox" id="fMp"> Multipeças</label>
<select id="fSort"><option value="dl">Mais baixados</option><option value="az">Nome A-Z</option></select>
<span class="count" id="count"></span>
</div>
<div class="grid" id="grid"></div>
<div class="empty" id="empty" style="display:none">Nenhum modelo encontrado.</div>
<button class="more" id="more" style="display:none">Carregar mais</button>
</main>
</div>

    if(state.diff!==""&&it.d!=+state.diff)return false;
    if(state.time!==""&&it.t!=+state.time)return false;
    if(state.mp&&!it.m)return false;
    if(state.q&&!it.n.toLowerCase().includes(state.q))return false;
    return true;
  });
  r.sort(state.sort==='az'?(a,b)=>a.n.localeCompare(b.n):(a,b)=>b.dl-a.dl);
  return r;
}
function tagList(it){let t=[];if(it.p>=0)t.push(D.PRINTER[it.p]);if(it.d>=0)t.push(D.DIFF[it.d]);if(it.t>=0)t.push(D.TIME[it.t].split(' (')[0]);return t;}
function render(reset){
  const r=filtered();
  document.getElementById('count').textContent=r.length+' modelos';
  const grid=document.getElementById('grid');
  if(reset)grid.innerHTML='';
  const slice=r.slice(0,state.page*PER);
  grid.innerHTML=slice.map(it=>{
    const img=D.PFX+it.i;
    return '<div class="card"><div class="thumb" style="background-image:url(\''+img+'\')">'+(it.m?'<span class="mpflag">Multipeças</span>':'')+'</div>'+
    '<div class="cbody"><div class="cname">'+it.n+'</div><div class="ctags">'+tagList(it).map(t=>'<span class="tag">'+t+'</span>').join('')+'</div></div>'+
    '<div class="cfoot"><button class="copybtn" data-link="'+PROD+it.s+'" title="Copiar link do modelo">⧉ Copiar link</button>'+
    '<a class="open" href="'+PROD+it.s+'" target="_blank" rel="noopener">Abrir ↗</a></div></div>';
  }).join('');
  document.getElementById('empty').style.display=r.length?'none':'block';
  document.getElementById('more').style.display=r.length>slice.length?'block':'none';
}
document.getElementById('grid').addEventListener('click',e=>{
  const b=e.target.closest('.copybtn');if(!b)return;
  const link=b.dataset.link;
  const done=()=>{b.textContent='✓ Copiado!';b.classList.add('copied');setTimeout(()=>{b.textContent='⧉ Copiar link';b.classList.remove('copied');},1400);};
  if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(link).then(done);}
  else{const t=document.createElement('textarea');t.value=link;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);done();}
});
document.getElementById('side').addEventListener('click',e=>{const c=e.target.closest('.cat');if(!c)return;document.querySelectorAll('.cat').forEach(x=>x.classList.remove('active'));c.classList.add('active');state.cat=+c.dataset.cat;state.page=1;document.getElementById('title').textContent=state.cat<0?'Todos os modelos':D.CATS[state.cat];render(true);});
q.addEventListener('input',e=>{state.q=e.target.value.toLowerCase();state.page=1;render(true);});
fPrinter.addEventListener('change',e=>{state.printer=e.target.value;state.page=1;render(true);});
fDiff.addEventListener('change',e=>{state.diff=e.target.value;state.page=1;render(true);});
fTime.addEventListener('change',e=>{state.time=e.target.value;state.page=1;render(true);});
fMp.addEventListener('change',e=>{state.mp=e.target.checked;state.page=1;render(true);});
fSort.addEventListener('change',e=>{state.sort=e.target.value;state.page=1;render(true);});
document.getElementById('more').addEventListener('click',()=>{state.page++;render(true);});
render(true);
</script>
</body></html>
